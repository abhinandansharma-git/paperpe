<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 675px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 60px;
    }
    .stat {
      font-size: 180px;
      font-weight: 900;
      color: #ff4757;
      text-shadow: 0 0 60px rgba(255, 71, 87, 0.5);
      line-height: 1;
    }
    .subtitle {
      font-size: 42px;
      color: #a4b0be;
      margin-top: 20px;
      text-align: center;
    }
    .highlight {
      color: #ffa502;
      font-weight: 700;
    }
    .bottom {
      position: absolute;
      bottom: 40px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .logo {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #ffa502, #ff6b35);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 28px;
    }
    .brand {
      font-size: 24px;
      color: #747d8c;
    }
  </style>
</head>
<body>
  <div class="stat">90%</div>
  <div class="subtitle">
    of retail traders lose money<br>
    in their <span class="highlight">first year</span>
  </div>
  <div class="bottom">
    <div class="logo">P</div>
    <div class="brand">@paperpe_in</div>
  </div>
</body>
</html>
