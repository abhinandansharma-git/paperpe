<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 675px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 60px;
    }
    .logo-big {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #c9a227 0%, #8b6914 100%);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 60px;
      color: #1a1a2e;
      margin: 0 auto 30px;
      box-shadow: 0 20px 60px rgba(201,162,39,0.3);
    }
    .brand {
      color: #c9a227;
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .tagline {
      font-size: 24px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 50px;
    }
    .features {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin-bottom: 50px;
    }
    .feature {
      text-align: center;
    }
    .feature-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .feature-text {
      color: white;
      font-size: 18px;
      font-weight: 500;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #c9a227 0%, #8b6914 100%);
      color: #1a1a2e;
      padding: 20px 50px;
      border-radius: 50px;
      font-size: 22px;
      font-weight: 700;
      box-shadow: 0 10px 40px rgba(201,162,39,0.3);
    }
    .handle {
      margin-top: 30px;
      font-size: 20px;
      color: rgba(255,255,255,0.5);
    }
    .handle span {
      color: #c9a227;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-big">P</div>
    <div class="brand">PaperPe</div>
    <div class="tagline">India's Paper Trading Platform</div>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">📊</div>
        <div class="feature-text">Real-time<br>Market Data</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🎯</div>
        <div class="feature-text">Virtual<br>Portfolio</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📈</div>
        <div class="feature-text">Track Your<br>Progress</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🆓</div>
        <div class="feature-text">100%<br>Free</div>
      </div>
    </div>
    
    <div class="cta">
      Follow for updates 🔔
    </div>
    
    <div class="handle">
      <span>@paperpe_in</span> · Coming Soon
    </div>
  </div>
</body>
</html>
