<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 675px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 50px;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #c9a227 0%, #8b6914 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 24px;
      color: #1a1a2e;
    }
    .brand {
      color: #c9a227;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .main-stat {
      text-align: center;
      padding: 20px 0;
    }
    .big-number {
      font-size: 180px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff4757 0%, #ff6b7a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .stat-label {
      font-size: 32px;
      color: #ffffff;
      margin-top: 10px;
      font-weight: 300;
    }
    .stat-label strong {
      color: #ff4757;
      font-weight: 700;
    }
    .sub-stats {
      display: flex;
      justify-content: space-around;
      padding: 30px 0;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .sub-stat {
      text-align: center;
    }
    .sub-stat-number {
      font-size: 48px;
      font-weight: 700;
      color: #ffa502;
    }
    .sub-stat-label {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      margin-top: 8px;
    }
    .source {
      text-align: center;
      font-size: 14px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">P</div>
      <span class="brand">PAPERPE</span>
    </div>
    
    <div class="main-stat">
      <div class="big-number">90%</div>
      <div class="stat-label">of Indian retail traders <strong>lose money</strong> in their first year</div>
    </div>
    
    <div class="sub-stats">
      <div class="sub-stat">
        <div class="sub-stat-number">₹75K</div>
        <div class="sub-stat-label">Average loss per trader</div>
      </div>
      <div class="sub-stat">
        <div class="sub-stat-number">1 Cr+</div>
        <div class="sub-stat-label">New traders in 2024</div>
      </div>
      <div class="sub-stat">
        <div class="sub-stat-number">71%</div>
        <div class="sub-stat-label">Quit within 2 years</div>
      </div>
    </div>
    
    <div class="source">Source: SEBI Study on Retail Participation in Derivatives (2023)</div>
  </div>
</body>
</html>
